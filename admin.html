<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Record | Mtel Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="adminAuthOverlay" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center hidden">
        <div class="text-center text-white">
            <div class="animate-spin w-8 h-8 border-4 border-[#FFC51A] border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="font-bold tracking-widest uppercase text-xs">Verifying Mtel Access...</p>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 py-12">

        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="text-slate-500 hover:text-slate-900 text-sm font-bold flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Hub
            </a>
        </div>
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-[#111827]">New <span class="text-[#FFC51A]">Knowledge</span></h1>
            <a href="manage.html" class="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-[#111827] transition-colors">
                <i data-lucide="settings" class="w-4 h-4"></i>
                Manage Existing Records
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-[#111827] p-6 text-white">
                <h2 class="font-bold">Entry Form</h2>
                <p class="text-slate-400 text-xs">Fill in the details to publish to the hub.</p>
            </div>

            <form id="projectForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Project Name</label>
                        <input type="text" id="projectName" placeholder="e.g. CRYPTOMIND" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-[#FFC51A] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Feature / Task Title</label>
                        <input type="text" id="featureTitle" placeholder="e.g. Navigation Update" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-[#FFC51A] outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Detailed Description</label>
                    <div id="editor-description" class="h-48 rounded-xl"></div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Links & Resources</label>
                    <div id="editor-links" class="h-24 rounded-xl"></div>
                </div>

                <div class="pt-6 border-t border-slate-50 flex flex-col md:flex-row gap-4 items-center">
                    <input type="password" id="adminSecret" placeholder="Admin Secret" class="w-full md:w-48 px-4 py-3 rounded-xl border-2 border-slate-100 outline-none focus:border-rose-400">
                    <button type="button" onclick="handleFormSubmit()" id="submitBtn" class="w-full flex-1 bg-[#FFC51A] text-[#111827] font-bold py-3 px-8 rounded-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span id="btnText">Publish to Knowledge Hub</span>
                        <div id="btnSpinner" class="hidden animate-spin w-5 h-5 border-2 border-[#111827] border-t-transparent rounded-full"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>

        function checkMtelAuth() {
                const user = sessionStorage.getItem('mtel_user');
                const overlay = document.getElementById('adminAuthOverlay');

                if (!user) {
                    // If no user session, show overlay and redirect to home
                    overlay.classList.remove('hidden');
                    window.location.href = 'index.html';
                    return false;
                }

                const userData = JSON.parse(user);
                if (userData.email.split('@')[1] !== 'mtel.co.th') {
                    alert("Unauthorized Domain");
                    window.location.href = 'index.html';
                    return false;
                }
                return true;
            }

            // Run this immediately on load
            window.addEventListener('load', () => {
                if (checkMtelAuth()) {
                    // Only if authorized, we run the existing logic (like fetchManageData)
                    if (typeof fetchManageData === "function") fetchManageData();
                    // and handle the secret auto-fill
                    const savedSecret = localStorage.getItem('mtel_admin_secret');
                    if (savedSecret && document.getElementById('adminSecret')) {
                        document.getElementById('adminSecret').value = savedSecret;
                    }
                }
        });

        const quillDesc = new Quill('#editor-description', { theme: 'snow' });
        const quillLinks = new Quill('#editor-links', { theme: 'snow' });

        // Logic to handle EDITING if we come from the manage page
        window.onload = async () => {
            const savedSecret = localStorage.getItem('mtel_admin_secret');
            if (savedSecret) {
                document.getElementById('adminSecret').value = savedSecret;
            }

            lucide.createIcons();
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');

            if (editId) {
                // If there's an ID in the URL, we fetch it and fill the form
                const res = await fetch('/api/get-projects');
                const projects = await res.json();
                const p = projects.find(item => item._id === editId);
                
                if (p) {
                    document.getElementById('projectName').value = p.projectName;
                    document.getElementById('featureTitle').value = p.featureTitle;
                    quillDesc.root.innerHTML = p.description;
                    quillLinks.root.innerHTML = p.links;
                    document.getElementById('submitBtn').innerText = "Update Existing Record";
                    document.getElementById('submitBtn').dataset.editId = editId;
                }
            }
        };

        async function handleFormSubmit() {
            //const btn = document.getElementById('submitBtn');
            //const originalText = btn.innerHTML;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            //const spinner = document.getElementById('btnSpinner');
            const secret = document.getElementById('adminSecret').value;

            // Set Loading State
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            if(spinner) spinner.classList.remove('hidden');
            if(btnText) btnText.innerText = "Processing...";
            //btn.disabled = true;
            //btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...`;
            //lucide.createIcons();

            // Show Loading State
            //btn.disabled = true;
            //btnText.innerText = "Processing...";
            //spinner.classList.remove('hidden');

            const editId = btn.dataset.editId;
            const payload = {
                projectName: document.getElementById('projectName').value,
                featureTitle: document.getElementById('featureTitle').value,
                description: quillDesc.root.innerHTML,
                links: quillLinks.root.innerHTML
            };

            if (!editId) payload.createdAt = new Date().toISOString();

            try {
                const res = await fetch(editId ? '/api/update-project' : '/api/add-project', {
                    method: editId ? 'PUT' : 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'x-admin-secret': secret 
                    },
                    body: JSON.stringify(editId ? { id: editId, ...payload } : payload)
                });

                if (res.ok) {
                    // ✅ SAVE SECRET FOR NEXT TIME
                    localStorage.setItem('mtel_admin_secret', secret);
                    
                    localStorage.removeItem('mtel_cache');
                    alert("Success!");
                    window.location.href = editId ? 'manage.html' : 'index.html';
                } else {
                    alert("Auth failed. Check Secret.");
                }

                // On Success:
                localStorage.setItem('mtel_admin_secret', secret); // Remember secret
            } catch (err) {
                alert("Network Error");
            } finally {
                // STOP LOADING (only if not redirecting)
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                if(spinner) spinner.classList.add('hidden');
                //btnText.innerText = editId ? "Update Existing Record" : "Publish to Knowledge Hub";
                //spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
