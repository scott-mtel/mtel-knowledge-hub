<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Mtel Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden mb-12">
            <div class="bg-[#111827] p-6 text-white flex justify-between items-center">
                <div>
                    <h2 id="formTitle" class="text-xl font-bold">Add New Knowledge</h2>
                    <p class="text-slate-400 text-xs">Publish assets to the Mtel Knowledge Hub</p>
                </div>
                <button onclick="resetForm()" id="cancelBtn" class="hidden text-xs bg-slate-800 px-3 py-1 rounded-lg hover:bg-slate-700">Cancel Edit</button>
            </div>

            <form id="projectForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Project Name</label>
                        <input type="text" id="projectName" placeholder="e.g. CRYPTOMIND" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-[#FFC51A] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Feature / Task Title</label>
                        <input type="text" id="featureTitle" placeholder="e.g. Login Revamp" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-[#FFC51A] outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Detailed Description</label>
                    <div id="editor-description" class="h-48 rounded-xl"></div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Links & Resources</label>
                    <div id="editor-links" class="h-32 rounded-xl"></div>
                </div>

                <div class="pt-6 border-t border-slate-50 flex flex-col md:flex-row gap-4 items-center">
                    <input type="password" id="adminSecret" placeholder="Enter Admin Secret" class="w-full md:w-64 px-4 py-3 rounded-xl border-2 border-slate-100 outline-none focus:border-rose-400">
                    <button type="button" onclick="handleFormSubmit()" id="submitBtn" class="w-full bg-[#FFC51A] text-[#111827] font-bold py-3 px-8 rounded-xl hover:scale-[1.02] transition-all">
                        Publish to Database
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h3 class="font-bold text-slate-800">Existing Records</h3>
                    <span id="recordCount" class="text-[10px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">0 Total</span>
                </div>
                
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="adminSearchInput" placeholder="Filter records..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:border-[#FFC51A] transition-all">
                </div>
            </div>
            <div id="manageList" class="divide-y divide-slate-50">
                </div>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-800">Existing Records</h3>
                <span id="recordCount" class="text-xs font-bold bg-slate-100 px-2 py-1 rounded text-slate-500">0 Total</span>
            </div>
            <div id="manageList" class="divide-y divide-slate-50">
                </div>
        </div>
    </div>

    <script>
        // Initialize Quill
        const quillDesc = new Quill('#editor-description', { theme: 'snow' });
        const quillLinks = new Quill('#editor-links', { theme: 'snow' });

        let allProjects = [];
        let currentEditingId = null;

        // LOAD DATA
        async function loadManageList() {
            const listContainer = document.getElementById('manageList');
            try {
                const res = await fetch('/api/get-projects');
                allProjects = await res.json();
                document.getElementById('recordCount').innerText = `${allProjects.length} Total`;
                
                listContainer.innerHTML = allProjects.map(p => `
                    <div class="p-5 flex items-center justify-between hover:bg-slate-50 transition-all">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-amber-500 uppercase tracking-tighter">${p.projectName}</span>
                            <span class="font-bold text-slate-700">${p.featureTitle}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="startEdit('${p._id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors">
                                <i data-lucide="edit-3" class="w-5 h-5"></i>
                            </button>
                            <button onclick="deleteProject('${p._id}')" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                listContainer.innerHTML = `<p class="p-8 text-rose-500">Error loading records.</p>`;
            }
        }

        // START EDIT
        function startEdit(id) {
            const p = allProjects.find(item => item._id === id);
            if (!p) return;

            currentEditingId = id;
            document.getElementById('projectName').value = p.projectName;
            document.getElementById('featureTitle').value = p.featureTitle;
            quillDesc.root.innerHTML = p.description;
            quillLinks.root.innerHTML = p.links;

            document.getElementById('formTitle').innerText = "Editing: " + p.featureTitle;
            document.getElementById('submitBtn').innerText = "Save Changes";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // RESET
        function resetForm() {
            currentEditingId = null;
            document.getElementById('projectForm').reset();
            quillDesc.setContents([]);
            quillLinks.setContents([]);
            document.getElementById('formTitle').innerText = "Add New Knowledge";
            document.getElementById('submitBtn').innerText = "Publish to Database";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // SUBMIT (CREATE OR UPDATE)
        async function handleFormSubmit() {
            const secret = document.getElementById('adminSecret').value;
            if (!secret) return alert("Secret required!");

            const payload = {
                projectName: document.getElementById('projectName').value,
                featureTitle: document.getElementById('featureTitle').value,
                description: quillDesc.root.innerHTML,
                links: quillLinks.root.innerHTML,
                createdAt: new Date().toISOString()
            };

            const url = currentEditingId ? '/api/update-project' : '/api/add-project';
            const method = currentEditingId ? 'PUT' : 'POST';
            const body = currentEditingId ? { id: currentEditingId, ...payload } : payload;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                alert("Success!");
                resetForm();
                loadManageList();
            } else {
                alert("Failed. Check Secret.");
            }
        }

        // DELETE
        async function deleteProject(id) {
            const secret = document.getElementById('adminSecret').value;
            if (!secret) return alert("Enter Secret in the password field first!");
            
            if (confirm("Delete this permanently?")) {
                const res = await fetch(`/api/delete-project?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-secret': secret }
                });
                if (res.ok) { loadManageList(); }
            }
        }

        // New function to render the management list based on a filtered array
        function renderManageList(projectsToDisplay) {
            const listContainer = document.getElementById('manageList');
            
            if (projectsToDisplay.length === 0) {
                listContainer.innerHTML = `<p class="p-8 text-center text-slate-400 text-sm">No matching records found.</p>`;
                return;
            }

            listContainer.innerHTML = projectsToDisplay.map(p => `
                <div class="p-5 flex items-center justify-between hover:bg-slate-50 transition-all">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black text-amber-500 uppercase tracking-tighter">${p.projectName}</span>
                        <span class="font-bold text-slate-700">${p.featureTitle}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startEdit('${p._id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="Edit">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                        <button onclick="deleteProject('${p._id}')" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="Delete">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Search Listener for the Admin page
        document.getElementById('adminSearchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p => 
                p.projectName.toLowerCase().includes(term) || 
                p.featureTitle.toLowerCase().includes(term)
            );
            renderManageList(filtered);
        });

        // Update your existing loadManageList to use the new render function
        async function loadManageList() {
            try {
                const res = await fetch('/api/get-projects');
                allProjects = await res.json();
                document.getElementById('recordCount').innerText = `${allProjects.length} Total`;
                renderManageList(allProjects); // Use the render function
            } catch (err) {
                console.error("Load failed", err);
            }
        }

        loadManageList();
    </script>
</body>
</html>
