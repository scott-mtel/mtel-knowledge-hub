<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Records | Mtel Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
            <div>
                <h1 class="text-2xl font-black text-[#111827]">Manage <span class="text-[#FFC51A]">Database</span></h1>
                <p class="text-slate-500 text-sm">Edit or remove existing knowledge entries.</p>
            </div>
            <div class="flex gap-3">
                <a href="admin.html" class="bg-[#111827] text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add New
                </a>
                <a href="index.html" class="bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                    <i data-lucide="eye" class="w-4 h-4"></i> View Hub
                </a>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6 flex items-center gap-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="manageSearch" placeholder="Search by project or task name..." 
                    class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-[#FFC51A]/50 transition-all">
            </div>
            <div id="recordCount" class="hidden md:block text-xs font-black text-slate-400 uppercase tracking-widest px-4">
                0 Records
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div id="manageList" class="divide-y divide-slate-50">
                <div class="py-20 text-center text-slate-400 animate-pulse">Connecting to MongoDB...</div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center">
            <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">Are you sure?</h3>
            <p class="text-slate-500 text-sm mb-6">This action cannot be undone. Please enter your secret to confirm.</p>
            <input type="password" id="deleteSecret" placeholder="Admin Secret" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 mb-4 outline-none focus:border-rose-500">
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-all">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition-all shadow-lg shadow-rose-200">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let allProjects = [];
        let projectToDelete = null;

        // 1. Fetch Projects
        async function fetchManageData() {
            try {
                const res = await fetch('/api/get-projects');
                allProjects = await res.json();
                renderManageList(allProjects);
                document.getElementById('recordCount').innerText = `${allProjects.length} Records`;
            } catch (err) {
                document.getElementById('manageList').innerHTML = `<div class="p-10 text-center text-rose-500">Failed to load data.</div>`;
            }
        }

        // 2. Render List
        function renderManageList(projects) {
            const list = document.getElementById('manageList');
            if(projects.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-slate-400">No records found.</div>`;
                return;
            }

            list.innerHTML = projects.map(p => `
                <div class="p-6 flex items-center justify-between hover:bg-slate-50/50 transition-colors">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">${p.projectName}</span>
                        <h4 class="font-bold text-slate-800">${p.featureTitle}</h4>
                        <span class="text-[10px] text-slate-400 font-medium">Added on ${new Date(p.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="flex gap-2">
                        <a href="admin.html?edit=${p._id}" class="p-3 bg-blue-50 text-blue-500 rounded-xl hover:bg-blue-500 hover:text-white transition-all">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </a>
                        <button onclick="openDeleteModal('${p._id}')" class="p-3 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. Search Logic
        document.getElementById('manageSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p => 
                p.projectName.toLowerCase().includes(term) || 
                p.featureTitle.toLowerCase().includes(term)
            );
            renderManageList(filtered);
        });

        // 4. Delete Logic
        function openDeleteModal(id) {
            projectToDelete = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            document.getElementById('deleteSecret').value = '';
            projectToDelete = null;
        }

        document.getElementById('confirmDeleteBtn').onclick = async () => {
            const secret = document.getElementById('deleteSecret').value;
            if(!secret) return alert("Secret required");

            const res = await fetch(`/api/delete-project?id=${projectToDelete}`, {
                method: 'DELETE',
                headers: { 'x-admin-secret': secret }
            });

            if(res.ok) {
                localStorage.removeItem('mtel_cache'); // Force fresh fetch on next visit
                closeDeleteModal();
                fetchManageData();
            } else {
                alert("Incorrect secret phrase.");
            }
        };

        // Init
        fetchManageData();
        lucide.createIcons();
    </script>
</body>
</html>
