<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mtel Knowledge Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .quill-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .quill-content p { margin-bottom: 0.75rem; }
        .quill-content a { color: #FFC51A; text-decoration: underline; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-[#111827]">
                    Mtel <span class="text-[#FFC51A]">Design Hub</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">Live project documentation and handover assets.</p>
            </div>
            
            <div class="relative group">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-[#FFC51A] transition-colors"></i>
                <input type="text" id="searchInput" placeholder="Search features or projects..." 
                    class="pl-12 pr-6 py-3 bg-white border-2 border-slate-100 rounded-2xl w-full md:w-80 outline-none focus:border-[#FFC51A] transition-all shadow-sm">
            </div>
        </div>

        <div class="bg-white border border-slate-100 rounded-3xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Project</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Feature / Task</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hidden md:table-cell">Brief Overview</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hidden sm:table-cell">Added</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="projectTableBody" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
            <div id="loadingState" class="py-20 text-center text-slate-400 font-medium">
                <div class="animate-pulse">Fetching records from MongoDB...</div>
            </div>
        </div>
    </main>

    <div id="projectModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] rounded-3xl shadow-2xl overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full transition-all">
                <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
            </button>
            <div id="modalContent" class="p-8 md:p-12"></div>
        </div>
    </div>

    <script>
        let allProjects = [];

        // Fetch data from your new API
        async function fetchProjects() {
            try {
                const response = await fetch('/api/get-projects');
                allProjects = await response.json();
                renderTable(allProjects);
                document.getElementById('loadingState').classList.add('hidden');
            } catch (err) {
                document.getElementById('loadingState').innerText = "⚠️ Error loading data. Check console.";
                console.error(err);
            }
        }

        function renderTable(projects) {
            const tableBody = document.getElementById('projectTableBody');
            tableBody.innerHTML = projects.map(p => {
                // Format the date (e.g., "Jan 12, 2024")
                const dateAdded = p.createdAt 
                    ? new Date(p.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    : '---';

                return `
                        <tr onclick="openModal('${p._id}')" class="group hover:bg-slate-50/80 cursor-pointer transition-colors border-b border-slate-50">
                            <td class="px-6 py-4">
                                <div class="w-max">
                                    <span class="text-[10px] font-black uppercase tracking-widest bg-[#FFC51A]/10 text-[#111827] px-2.5 py-1 rounded-md border border-[#FFC51A]/20 whitespace-nowrap">
                                        ${p.projectName}
                                    </span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm font-bold text-[#111827] group-hover:text-[#FFC51A] transition-colors">
                                    ${p.featureTitle}
                                </div>
                            </td>
                            <td class="px-6 py-4 hidden md:table-cell">
                                <div class="text-xs text-slate-500 line-clamp-1 max-w-[250px]">
                                    ${p.description.replace(/<[^>]*>/g, '')}
                                </div>
                            </td>
                            <td class="px-6 py-4 hidden sm:table-cell">
                                <span class="text-xs font-medium text-slate-400">${dateAdded}</span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button onclick="copyProjectLink(event, '${p._id}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 text-slate-400 hover:bg-[#FFC51A] hover:text-[#111827] transition-all">
                                        <i data-lucide="link" class="w-4 h-4"></i>
                                    </button>
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 text-slate-400 group-hover:bg-[#FFC51A] group-hover:text-[#111827] transition-all">
                                        <i data-lucide="maximize-2" class="w-4 h-4"></i>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
            }).join('');
            lucide.createIcons();
        }

        function openModal(id) {
            const project = allProjects.find(p => p._id === id);
            if (!project) return;

            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-xs font-black uppercase tracking-widest bg-[#FFC51A] text-[#111827] px-4 py-1.5 rounded-lg">
                            ${project.projectName}
                        </span>
                        <span class="text-xs font-bold text-slate-400 uppercase">
                            Added: ${new Date(project.createdAt).toLocaleDateString()}
                        </span>
                    </div>
                    <h2 class="text-4xl font-black leading-tight text-[#111827]">${project.featureTitle}</h2>
                </div>
                
                <div class="mb-8">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Overview</h4>
                    <div class="quill-content text-slate-600 leading-relaxed text-lg">
                        ${project.description}
                    </div>
                </div>
                
                ${project.note ? `
                    <div class="bg-slate-50 rounded-2xl p-6 mb-8 border-l-8 border-[#FFC51A]">
                        <span class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Internal Note</span>
                        <p class="text-sm font-medium italic text-[#111827]">${project.note}</p>
                    </div>
                ` : ''}

                <div class="pt-8 border-t border-slate-100">
                    <span class="text-xs font-bold text-slate-400 uppercase block mb-4">Resources & Links</span>
                    <div class="quill-content font-semibold text-[#111827]">
                        ${project.links}
                    </div>
                </div>
            `;

            document.getElementById('projectModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('projectModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 1. Function to copy the unique link
        function copyProjectLink(event, id) {
            event.stopPropagation(); // Prevents the row's click event from firing
            
            const url = new URL(window.location.href);
            url.searchParams.set('id', id); // Adds ?id=... to the URL
            
            navigator.clipboard.writeText(url.toString()).then(() => {
                alert("Link copied to clipboard! You can now share this specific task.");
            });
        }

        // 2. Updated init() function to handle shared links
        async function fetchProjects() {
            try {
                const response = await fetch('/api/get-projects');
                allProjects = await response.json();
                renderTable(allProjects);
                document.getElementById('loadingState').classList.add('hidden');

                // CHECK IF A LINK WAS SHARED:
                const urlParams = new URLSearchParams(window.location.search);
                const sharedId = urlParams.get('id');
                if (sharedId) {
                    openModal(sharedId);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Search Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p => 
                p.projectName.toLowerCase().includes(term) || 
                p.featureTitle.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        // Initialize
        fetchProjects();
    </script>
</body>
</html>
